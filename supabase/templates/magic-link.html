<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your DATAEEL sign-in link</title>
  </head>
  <body style="margin:0;padding:0;background:#0b0f14;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:#e6e9ef;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#0b0f14;padding:32px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="560" cellpadding="0" cellspacing="0" border="0" style="width:100%;max-width:560px;background:#111822;border:1px solid #1f2a37;border-radius:12px;overflow:hidden;">
            <tr>
              <td style="padding:28px 32px 16px 32px;">
                <div style="font-family:'Space Grotesk','Segoe UI',sans-serif;font-size:22px;font-weight:700;color:#d9ff3f;letter-spacing:-0.01em;">DATAEEL</div>
              </td>
            </tr>
            <tr>
              <td style="padding:0 32px 16px 32px;">
                <h1 style="margin:0 0 12px 0;font-size:22px;line-height:1.3;color:#ffffff;">Your sign-in link</h1>
                <p style="margin:0 0 16px 0;font-size:15px;line-height:1.6;color:#b3bcc8;">
                  Click below to sign in to DATAEEL. This link expires in 60 minutes and can only be used once.
                </p>
              </td>
            </tr>
            <tr>
              <td style="padding:4px 32px 24px 32px;" align="left">
                <a href="{{ .ConfirmationURL }}"
                   style="display:inline-block;background:#d9ff3f;color:#0b0f14;font-weight:600;font-size:15px;text-decoration:none;padding:12px 22px;border-radius:8px;">
                  Sign in to DATAEEL
                </a>
              </td>
            </tr>
            <tr>
              <td style="padding:16px 32px 24px 32px;border-top:1px solid #1f2a37;">
                <p style="margin:0;font-size:12px;line-height:1.6;color:#6b7383;">Didn't request this? Ignore this email.</p>
              </td>
            </tr>
          </table>
          <p style="margin:16px 0 0 0;font-size:11px;color:#4c5566;">&copy; DATAEEL.</p>
        </td>
      </tr>
    </table>
  </body>
</html>
