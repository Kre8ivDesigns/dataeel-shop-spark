# ── Auth email templates ────────────────────────────────────────────────────
# Custom branded emails for local Supabase dev (supabase start).
# For PRODUCTION apply the same HTML in the Supabase Dashboard:
#   Authentication → Email Templates → Confirm signup
#   See supabase/templates/README.md for step-by-step instructions.

# Template paths are resolved from the repository root (Supabase CLI `link` / `start`).
[auth.email.template.confirmation]
subject = "Confirm your Dataeel account"
content_path = "./supabase/templates/confirm-signup.html"

# ── CORS + Stripe return URLs ────────────────────────────────────────────────
# Set Edge Function secret ALLOWED_ORIGINS when you have a real domain.
# Dashboard: Project Settings → Edge Functions → Secrets.
# Example: ALLOWED_ORIGINS=https://www.example.com,https://example.com,https://app.vercel.app
# (scheme required, no trailing slash, comma-separated). See supabase/functions/_shared/cors.ts.

[auth.email.template.recovery]
subject = "Reset your Dataeel password"
content_path = "./supabase/templates/reset-password.html"

[auth.email.template.magic_link]
subject = "Your Dataeel sign-in link"
content_path = "./supabase/templates/magic-link.html"

# stripe-webhook is called server-to-server by Stripe — no JWT
[functions.stripe-webhook]
verify_jwt = false

